<svg xmlns="http://www.w3.org/2000/svg">
<!-- Fonte canonica del marchio Unitizy. Le pagine interne referenziano questi id via <use>.
     index.html tiene una copia inline del solo glifo per il percorso critico: aggiornarle insieme. -->
<defs>
  <linearGradient id="bg64" gradientUnits="userSpaceOnUse" x1="0" y1="32" x2="64" y2="32">
    <stop offset="0" stop-color="#4C6FFF"/><stop offset="1" stop-color="#7C3AED"/>
  </linearGradient>
  <linearGradient id="bg600" gradientUnits="userSpaceOnUse" x1="0" y1="20" x2="600" y2="20">
    <stop offset="0" stop-color="#4C6FFF"/><stop offset="1" stop-color="#7C3AED"/>
  </linearGradient>
</defs>
<!-- master: icosaedro con breccia + frammenti in arrivo (viewBox 0 0 64 64) -->
<g id="mark">
  <g fill="url(#bg64)">
    <path d="M3 31l2.6-2 2.4 2.2-2.7 1.9z"/><path d="M7.5 23l3-1.4 1 2.8-2.6 1.5z"/><path d="M8 40.5l2.8-1 1.4 2.6-2.9 1.2z"/><path d="M12 30l3.6-2.4 2.7 1.7-.5 3-3.3 1z"/><path d="M15.5 18.5l3-1 1.2 2.9-2.7 1.3z"/><path d="M15.8 43.5l3.2-.7 1 2.8-3.1 1z"/><path d="M17.5 30.6l4-2.7 2.2 2.3-1.3 3.2-3.6.4z"/><path d="M21.6 25.9l2.7-1.6 1.5 2.4-2.5 1.6z"/><path d="M21.8 36.2l2.9-.4 1 2.5-2.8.9z"/>
  </g>
  <g fill="none" stroke="url(#bg64)" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
    <path d="M38 10 L56 21 L56 43 L38 54 L20 43 L20 37 M20 27 L20 21 L38 10"/>
    <path d="M25 25 L51 25 L38 47 Z"/>
    <path d="M38 10 L25 25 M38 10 L51 25 M20 21 L25 25 M56 21 L51 25 M20 43 L25 25 M20 43 L38 47 M38 54 L38 47 M56 43 L38 47 M56 43 L51 25"/>
  </g>
</g>
<!-- glifo compatto: favicon e dimensioni sotto i 32px (viewBox 0 0 64 64) -->
<g id="glyph">
  <path d="M38 8 L58 20 V44 L38 56 L18 44 V36 L24 32 L18 28 V20 Z" fill="url(#bg64)"/>
  <path d="M38 8 V32 M38 32 L18 44 M38 32 L58 44 M38 32 L18 20 M38 32 L58 20" stroke="#fff" stroke-opacity=".5" stroke-width="2" fill="none"/>
  <path d="M8 30l3.4-2.4 2.6 2.4-3 2.2z" fill="url(#bg64)"/>
</g>
<!-- variante verticale del motivo: alto (caos) → basso (ordine), per formati verticali (viewBox 0 0 40 600) -->
<g id="flowv" transform="translate(40 0) rotate(90)"><use href="#flow"/></g>
<!-- motivo dei frammenti: irregolari → rombi, direzione di lettura (viewBox 0 0 600 40) -->
<g id="flow">
  <g fill="url(#bg600)">
    <path d="M10 22l4-3 3 3-3.6 2.6z" opacity=".5"/><path d="M60 14l5-2 2 4-4 2.4z" opacity=".55"/><path d="M95 27l4-3.4 3.6 2.6-3 3.4z" opacity=".6"/><path d="M150 18l6-3 3 4-4 3.4z" opacity=".68"/><path d="M210 24l6-4 4 3-3 4.4z" opacity=".76"/><path d="M280 16l7-2 2 5-5 3z" opacity=".84"/><path d="M350 22l7-4 4 4-4 4z" opacity=".9"/>
    <rect x="430" y="13" width="13" height="13" transform="rotate(45 436 19)"/><rect x="500" y="14" width="13" height="13" transform="rotate(45 506 20)"/><rect x="565" y="15" width="12" height="12" transform="rotate(45 571 21)"/>
  </g>
</g>
</svg>
